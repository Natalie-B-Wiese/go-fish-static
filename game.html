<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Go Fish Static</title>
  </head>
  <body>
    <main class="game-view">

      <div class="panel" id="game-board">
        <header class="panel__header panel__header--padded gap-xs">
          <button class="btn btn--no-border btn--icon btn--small">
            <span class="material-symbols-outlined icon--small">arrow_back</span>
          </button>
          <h2>Game 1</h2>
        </header>

        <div class="panel__content op-stack gap-xs" id="players">
          <h3>Players</h3>

          <div class="players__hand op-stack gap-xs">
            <details class="accordion">
              <summary>
                <span class="material-symbols-outlined icon accordion__marker">arrow_right</span>
                <span class="accordion__label">Gabe</span>
                <div class="text-pair text-pair--inline">
                  <div>Cards: <span><strong>7</strong></span></div>
                  <div>Books: <span><strong>7</strong></span></div>
                </div>
              </summary>
              <div class="accordion__content">
                <div class="flex flex-row flex-no-wrap justify-between">
                  <div class="flex cards-stacked">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                  </div>
                  <div class="flex cards-stacked">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                  </div>
                </div>
                
              </div>
            </details>

            <details class="accordion">
              <summary>
                <span class="material-symbols-outlined icon accordion__marker">arrow_right</span>
                <span class="accordion__label">Gabe</span>
                <div class="text-pair text-pair--inline">
                  <div>Cards: <span><strong>7</strong></span></div>
                  <div>Books: <span><strong>7</strong></span></div>
                </div>
              </summary>
              <div class="accordion__content">
                <div class="flex flex-row flex-no-wrap justify-between">
                  <div class="flex cards-stacked">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                  </div>
                  <div class="flex cards-stacked">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                    <img src="img/2_of_clubs.png" class="playing-card">
                  </div>
                </div>
                
              </div>
            </details>
          </div>
        </div>

      </div>
      

      <div class="game-feed panel panel--primary">
        <header class="panel__header panel__header--padded op-split">
          <h2>Game Feed</h2>
          <div class="badge badge--primary">Your Turn</div>
        </header>
        
         
        <div class="panel__content op-stack flex-grow-1">
          <div class="feed-content op-stack gap-xs flex-grow-1">
            <div class="feed-action player-action">
              Joby asked <strong>Natalie</strong> for any <strong>8</strong>s
            </div>

            <div class="action-responses op-stack gap-xs">
              
              <div class="flex flex-row flex-no-wrap items-center gap-xs">
                <span class="material-symbols-outlined">subdirectory_arrow_right</span>
                <div class="feed-action feed-response feed-response--unsuccess flex-grow-1">
                  Go Fish: Natalie doesn't have any 8s
                </div>
              </div>
              
              <div class="flex flex-row flex-no-wrap items-center gap-xs">
                <span class="material-symbols-outlined">subdirectory_arrow_right</span>
                <div class="feed-action feed-response feed-response--result flex-grow-1">
                  You drew a 7 of Diamonds
                </div>
              </div>
              
            </div>
            
          </div>

          <div class="game-actions op-stack items-stretch gap-sm">
            <div class="game-actions__options op-split items-stretch gap-sm">
              <div class="form-group flex-grow-1">
                <label class="form-label" for="player">Player</label>
                <select class="form-control form-control--large" id="player">
                  <option>Bily</option>
                  <option>Joyby</option>
                  <option>Ganger</option>
                </select>
              </div>

              <div class="form-group flex-grow-1">
                <label class="form-label" for="rank">Card Rank</label>
                <select class="form-control form-control--large" id="rank">
                  <option>Ace</option>
                  <option>Two</option>
                  <option>Three</option>
                </select>
              </div>
            </div>

            <button class="btn btn--primary">Ask Bily for Twos</button>

          </div>
        </div>


      </div>

      <div class="hand panel">
        <header class="panel__header panel__header--padded panel__header--condensed">
          <h2>Hand</h2>
        </header>
        
         
        <div class="panel__content">
          <div class="cards-stacked flex">
            <img src="img/2_of_clubs.png" class="playing-card">
            <img src="img/2_of_clubs.png" class="playing-card">
            <img src="img/2_of_clubs.png" class="playing-card">
          </div>
        </div>
      </div>

      <div class="books panel">
        <header class="panel__header panel__header--padded panel__header--condensed">
          <h2>Books</h2>
        </header>
        
        <div class="panel__content">
          <div class="cards-stacked flex">
            <img src="img/2_of_clubs.png" class="playing-card">
            <img src="img/2_of_clubs.png" class="playing-card">
            <img src="img/2_of_clubs.png" class="playing-card">
          </div>
          
        </div>
      </div>

    </main>
    
  </body>
</html>
