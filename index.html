<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/stylesheets/application.css" />
    <title>Go Fish Static</title>
  </head>
  <body class="op-page">
    

    <div class="op-page__sidebar">
      <nav class="sidebar sidebar--drawer sidebar--padded sidebar--primary">
        
        <a class="sidebar__brand" href="/">
          <h2 class="content-header__title">Go Fish</h2>
        </a>
      
        <div class="sidebar__content sidebar__content--start">
          <button class="btn btn--no-border btn--active">
            <i class="ph ph-puzzle-piece icon icon--large"></i>
            Games
          </button>

          <button class="btn btn--no-border">
            <i class="ph ph-ranking icon icon--large"></i>
            Stats
          </button>
        </div>

        <div class="sidebar__content sidebar__content--end">
          <div class="divider"></div>
          <button class="btn btn--no-border">
            Profile
          </button>

          <button class="btn btn--no-border">
            Log Out
          </button>
          
        </div>    
      </nav>

    </div>

    
    <div class="op-page__main">
      <main class="op-page__main-content">
        
        <div class="op-stack gap-xl">
          <div>
            <header class="content-header">
              <div class="content-header__details">
                <h2 class="content-header__title">Your Games</h2>
              </div>
              <div class="content-header__aside">
                <button class="btn btn--primary margin-right-md">
                  <span class="material-symbols-outlined icon">add</span>
                  New Game
                </button>
              </div>
              <div class="divider"></div>
            </header>
            
            <div class="op-stack gap-sm">
              <div class="card card--padded card--condensed">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 2</div>
                  <div class="op-split gap-xl">
                    <div class="flex items-center">This Game is Full</div>
                    <button class="btn">
                      Play Now
                      <i class="ph ph-arrow-fat-line-right icon icon--large"></i>
                    </button>
                  </div>
                </div>
              </div>
            
              <div class="card card--padded card--condensed">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 2</div>
                  <div class="op-split gap-xl">
                    <div class="flex items-center">2/3 Players</div>
                    <button class="btn">
                      Play Now
                      <i class="ph ph-arrow-fat-line-right icon icon--large"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div>
            <header class="content-header">
              <div class="content-header__details">
                <h2 class="content-header__title">Games</h2>
              </div>
              <div class="divider"></div>
            </header>
            
            <div class="op-stack gap-sm">
              <div class="card card--padded card--condensed">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 2</div>
                  <div class="op-split gap-xl">
                    <div class="flex items-center">1/5 Players</div>
                    <button class="btn">
                      Join
                      <i class="ph ph-user-plus icon icon--large"></i>
                    </button>
                  </div>
                </div>
              </div>

              <div class="card card--padded card--condensed">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 1</div>
                  <div class="op-split gap-xl">
                    <div class="flex items-center">2/3 Players</div>
                    <button class="btn">
                      Join
                      <i class="ph ph-user-plus icon icon--large"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
    
  </body>
</html>
