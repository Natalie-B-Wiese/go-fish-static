<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Go Fish Static</title>
  </head>
  <body class="op-page">


    <div class="op-page__sidebar">
      <nav class="sidebar sidebar--drawer sidebar--padded">
        <header class="content-header">
          <div class="content-header__details">
            <h2 class="content-header__title">Go Fish</h2>
          </div>          
        </header>
      
        <div class="sidebar__content sidebar__content--start">
          <button class="btn btn--no-border btn--active">
            <span class="material-symbols-outlined">playing_cards</span>
            Games
          </button>

          <button class="btn btn--no-border">
            <span class="material-symbols-outlined">leaderboard</span>
            Stats
          </button>
        </div>

        <div class="sidebar__content sidebar__content--end">
          <div class="flex flex-col gap-xl">
            <div class="divider"></div>
            <a href="" class="sidebar__link">Profile</a>
            <a href="" class="sidebar__link">Log Out</a>
          </div>
        </div>
      </nav>

    </div>

    
    <div class="op-page__main">
      <main class="op-page__main-content">
        
        <div class="op-stack gap-xl">
          <div>
            <header class="content-header">
              <div class="content-header__details">
                <h2 class="content-header__title">Your Games</h2>
              </div>
              <div class="content-header__aside">
                <button class="btn btn--primary margin-right-md">New Game</button>
              </div>
              <div class="divider"></div>
            </header>
            
            <div class="op-stack gap-sm">
              <div class="card card--padded">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 2</div> 
                  <div class="flex items-center"><em>(Full)</em></div>
                  <button class="btn">Play Now</button>
                </div>
              </div>
            
              <div class="card card--padded">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 2</div>
                  <div class="flex items-center"><em>(2/3 Players)</em></div>
                  <button class="btn btn--disabled">Waiting...</button>
                </div>
              </div>
            </div>
          </div>

          <div>
            <header class="content-header">
              <div class="content-header__details">
                <h2 class="content-header__title">Games</h2>
              </div>
              <div class="divider"></div>
            </header>
            
            <div class="op-stack gap-sm">
              <div class="card card--padded">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 2</div>
                  <div class="flex items-center"><em>(1/5 Players)</em></div>
                  <button class="btn">Join</button>
                </div>
              </div>

              <div class="card card--padded">
                <div class="flex flex-row justify-between items-stretch">
                  <div class="flex items-center">Game 1</div>
                  <div class="flex items-center"><em>(2/3 Players)</em></div>
                  <button class="btn">Join</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
    
  </body>
</html>
